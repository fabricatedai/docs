<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Agent Fabric</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:#0d0d2b;-webkit-overflow-scrolling:touch}
iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#8888A0;font-family:system-ui,sans-serif;font-size:14px}
</style>
</head>
<body>
<div class="loading">Loading…</div>
<iframe id="frame" allow="clipboard-write" scrolling="yes"></iframe>
<script>
document.getElementById('frame').src = "https://dc-demo-steel.vercel.app/?_t=" + Date.now();
document.getElementById('frame').onload = function(){ document.querySelector('.loading').style.display='none'; };
</script>
</body>
</html>
